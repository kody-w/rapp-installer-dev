<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPP Brainstem</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Inline SVG icon helper ── */
  .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    flex-shrink: 0;
  }
  .icon svg { width: 100%; height: 100%; fill: currentColor; }
  .icon-lg { width: 20px; height: 20px; }
  .icon-xl { width: 40px; height: 40px; }

  header {
    padding: 12px 24px;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #161b22;
  }
  header .logo {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: #1f6feb;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  header h1 { font-size: 15px; font-weight: 600; color: #e6edf3; }
  header .controls {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #8b949e;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #3fb950;
    animation: pulse 2s infinite;
  }
  .dot.offline { background: #f85149; animation: none; }
  .dot.pending { background: #d29922; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .icon-btn {
    background: none;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 4px 7px;
    cursor: pointer;
    color: #8b949e;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .icon-btn.active { border-color: #3fb950; color: #3fb950; background: rgba(63,185,80,0.08); }

  /* ── Login overlay ── */
  #login-overlay {
    position: fixed; inset: 0;
    background: rgba(13,17,23,0.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    max-width: 420px;
  }
  .login-card .login-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: #1f6feb;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .login-card h2 { font-size: 20px; margin-bottom: 8px; }
  .login-card p { color: #8b949e; font-size: 14px; margin-bottom: 24px; }
  .login-btn {
    background: #238636; color: #fff; border: none; border-radius: 8px;
    padding: 12px 24px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .login-btn:hover { background: #2ea043; }
  .login-btn:disabled { opacity: 0.5; cursor: default; }
  .device-code {
    font-family: "SF Mono", monospace;
    font-size: 32px; font-weight: 700; letter-spacing: 4px;
    color: #58a6ff; margin: 16px 0;
  }
  .login-status { color: #8b949e; font-size: 13px; margin-top: 16px; }
  .login-success { color: #3fb950; }
  .code-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin: 16px 0;
  }
  .code-row .device-code { margin: 0; }
  .copy-btn {
    background: #21262d; border: 1px solid #30363d; border-radius: 6px;
    color: #8b949e; cursor: pointer; padding: 6px 8px;
    display: inline-flex; align-items: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .copy-btn:hover { background: #30363d; color: #e6edf3; border-color: #484f58; }
  .copy-btn.copied { background: #238636; color: #fff; border-color: #2ea043; }
  .copy-toast {
    font-size: 12px; color: #3fb950; height: 18px; margin-top: 4px;
    transition: opacity 0.2s;
  }

  /* ── Chat ── */
  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg { display: flex; gap: 12px; max-width: 760px; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.system { align-self: center; }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #8b949e; background: #21262d;
  }
  .avatar .icon { width: 18px; height: 18px; }
  .msg.user .avatar { background: #1f6feb; color: #fff; }
  .msg.assistant .avatar { background: #161b22; border: 1px solid #30363d; color: #58a6ff; }

  .bubble {
    padding: 12px 16px; border-radius: 12px;
    font-size: 14px; line-height: 1.6;
    max-width: 640px; word-break: break-word;
  }
  .msg.assistant .bubble {
    background: #161b22; border: 1px solid #21262d;
    border-radius: 4px 12px 12px 12px;
  }
  .msg.assistant .bubble a { color: #58a6ff; text-decoration: none; }
  .msg.assistant .bubble a:hover { text-decoration: underline; }
  .msg.assistant .bubble strong { color: #e6edf3; }
  .msg.assistant .bubble ol, .msg.assistant .bubble ul { padding-left: 20px; margin: 8px 0; }
  .msg.assistant .bubble li { margin: 6px 0; }
  .msg.assistant .bubble p { margin: 6px 0; }
  .msg.assistant .bubble p:first-child { margin-top: 0; }
  .msg.assistant .bubble p:last-child { margin-bottom: 0; }
  .msg.assistant .bubble code {
    background: #0d1117; padding: 2px 6px; border-radius: 4px;
    font-family: "SF Mono", monospace; font-size: 12px;
  }
  .msg.assistant .bubble pre {
    background: #0d1117; padding: 10px; border-radius: 6px;
    overflow-x: auto; margin: 8px 0;
  }
  .msg.assistant .bubble pre code { padding: 0; background: none; }
  .msg.user .bubble {
    background: #1f6feb; border-radius: 12px 4px 12px 12px;
    white-space: pre-wrap;
  }
  .msg.system .bubble {
    background: transparent; color: #8b949e;
    font-size: 12px; border: none; padding: 4px 8px;
  }

  /* ── Agent activity indicator ── */
  .agent-logs-wrapper {
    margin-top: 10px; border: 1px solid #30363d;
    border-radius: 6px; overflow: hidden;
    animation: logsAppear 0.3s ease-out;
  }
  .agent-logs-wrapper.hidden { display: none; }
  @keyframes logsAppear {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logs-label {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px; background: #0d1117;
    color: #8b949e; font-size: 10px; font-weight: 600;
    font-family: "SF Mono", monospace;
    text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; user-select: none;
  }
  .logs-label:hover { background: #161b22; color: #e6edf3; }
  .logs-label .arrow { transition: transform 0.2s; font-size: 8px; }
  .logs-label .arrow.open { transform: rotate(90deg); }
  .logs-label .agent-name { color: #d2a8ff; }
  .agent-logs {
    padding: 8px 10px; background: #0d1117;
    font-size: 10px; color: #7ee787;
    font-family: "SF Mono", monospace;
    white-space: pre-wrap; max-height: 160px;
    overflow-y: auto; border-top: 1px solid #21262d;
  }
  .agent-logs.collapsed { display: none; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #8b949e; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Footer ── */
  footer {
    padding: 16px 24px;
    border-top: 1px solid #21262d;
    background: #161b22;
  }
  .input-row {
    display: flex; gap: 10px;
    max-width: 760px; margin: 0 auto;
  }
  #input {
    flex: 1; background: #0d1117;
    border: 1px solid #30363d; border-radius: 8px;
    color: #e6edf3; font-size: 14px;
    padding: 10px 14px; resize: none; outline: none;
    line-height: 1.5; max-height: 120px;
    transition: border-color 0.15s;
  }
  #input:focus { border-color: #1f6feb; }
  #input::placeholder { color: #484f58; }
  #send {
    background: #1f6feb; color: #fff; border: none; border-radius: 8px;
    padding: 10px 18px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, opacity 0.15s;
    align-self: flex-end;
  }
  #send:hover { background: #388bfd; }
  #send:disabled { opacity: 0.4; cursor: default; }

  .toolbar-row {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 760px; margin: 0 auto 8px;
    font-size: 11px; color: #484f58;
  }
  .toolbar-row .left { display: flex; align-items: center; gap: 12px; }
  .toolbar-row .right { display: flex; align-items: center; gap: 10px; }
  .toolbar-link {
    background: none; border: none; color: #484f58;
    cursor: pointer; font-size: 11px;
    display: inline-flex; align-items: center; gap: 3px;
    text-decoration: none; transition: color 0.15s;
  }
  .toolbar-link:hover { color: #8b949e; }
  #session-id { font-family: "SF Mono", monospace; }
  .dev-only { display: none; }
  body.dev-mode .dev-only { display: flex; }

  /* ── Model selector ── */
  #model-select {
    background: #0d1117; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 6px;
    padding: 4px 8px; font-size: 12px;
    font-family: "SF Mono", monospace;
    cursor: pointer; outline: none; transition: border-color 0.15s;
  }
  #model-select:hover { border-color: #58a6ff; }
  #model-select:focus { border-color: #1f6feb; }
</style>
</head>
<body>

<div id="login-overlay" style="display:none">
  <div class="login-card">
    <div class="login-icon">
      <span class="icon icon-xl"><svg viewBox="0 0 24 24"><path d="M13 3C9.2 3 6.2 5.9 6 9.7L4.1 12.6c-.3.5.1 1.1.7 1.1H6v3c0 1.1.9 2 2 2h1v3h7v-4.9c2.8-1.5 5-4.8 5-8.1 0-5-4.5-8-8-5zM9.5 9C8.7 9 8 8.3 8 7.5S8.7 6 9.5 6s1.5.7 1.5 1.5S10.3 9 9.5 9zm5 0c-.8 0-1.5-.7-1.5-1.5S13.7 6 14.5 6s1.5.7 1.5 1.5S15.3 9 14.5 9z"/></svg></span>
    </div>
    <h2>RAPP Brainstem</h2>
    <p>Sign in with your GitHub account to use Copilot AI.</p>
    <div id="login-step1">
      <button class="login-btn" onclick="startLogin()">Sign in with GitHub</button>
    </div>
    <div id="login-step2" style="display:none">
      <p style="margin-bottom:8px">Enter this code on GitHub:</p>
      <div class="code-row">
        <div class="device-code" id="device-code"></div>
        <button class="copy-btn" id="copy-code-btn" onclick="copyDeviceCode()" title="Copy code">
          <span class="icon"><svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/><path fill-rule="evenodd" d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/></svg></span>
        </button>
      </div>
      <div class="copy-toast" id="copy-toast">&nbsp;</div>
      <a id="verify-link" href="#" target="_blank" style="color:#58a6ff;font-size:14px">Open GitHub &rarr;</a>
      <div class="login-status" id="login-status">Waiting for authorization...</div>
    </div>
    <div id="login-step3" style="display:none">
      <div style="margin-bottom:16px;color:#3fb950;">
        <span class="icon icon-xl"><svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 16A8 8 0 108 0a8 8 0 000 16zm3.78-9.72a.75.75 0 00-1.06-1.06L6.75 9.19 5.28 7.72a.75.75 0 00-1.06 1.06l2 2a.75.75 0 001.06 0l4.5-4.5z"/></svg></span>
      </div>
      <p class="login-success" style="font-size:16px;font-weight:600">Connected to GitHub Copilot</p>
    </div>
  </div>
</div>

<header>
  <div class="logo">
    <span class="icon"><svg viewBox="0 0 24 24" fill="#fff"><path d="M13 3C9.2 3 6.2 5.9 6 9.7L4.1 12.6c-.3.5.1 1.1.7 1.1H6v3c0 1.1.9 2 2 2h1v3h7v-4.9c2.8-1.5 5-4.8 5-8.1 0-5-4.5-8-8-5zM9.5 9C8.7 9 8 8.3 8 7.5S8.7 6 9.5 6s1.5.7 1.5 1.5S10.3 9 9.5 9zm5 0c-.8 0-1.5-.7-1.5-1.5S13.7 6 14.5 6s1.5.7 1.5 1.5S15.3 9 14.5 9z"/></svg></span>
  </div>
  <h1>RAPP Brainstem</h1>
  <div class="controls">
    <div class="dot" id="dot"></div>
    <span id="status-text">checking...</span>
    <select id="model-select" onchange="changeModel(this.value)"></select>
    <button class="icon-btn" id="voice-btn" onclick="toggleVoice()" title="Voice mode off">
      <span class="icon"><svg viewBox="0 0 16 16"><path d="M11.536 3.464a5 5 0 010 7.072.75.75 0 01-1.06-1.06 3.5 3.5 0 000-4.95.75.75 0 011.06-1.061zM8.243 4.757a.75.75 0 00-1.486 0v6.486a.75.75 0 001.486 0V4.757zM6.243 6a.75.75 0 00-1.486 0v4a.75.75 0 001.486 0V6zM4.243 7.257a.75.75 0 00-1.486 0v1.486a.75.75 0 001.486 0V7.257zM12.743 7.257a.75.75 0 00-1.486 0v1.486a.75.75 0 001.486 0V7.257z"/></svg></span>
    </button>
    <a class="icon-btn" href="vscode://file/$HOME/.brainstem/src/rapp_brainstem" id="vscode-link" title="Open in VS Code">
      <span class="icon"><svg viewBox="0 0 16 16"><path d="M14.85 3.22l-3.07-1.56a.75.75 0 00-.82.12L5.8 6.56 3.16 4.58a.5.5 0 00-.64.05l-.86.74a.5.5 0 00-.004.72L3.87 8l-2.22 1.92a.5.5 0 00.003.72l.86.74a.5.5 0 00.64.05L5.8 9.44l5.16 4.78a.75.75 0 00.82.12l3.07-1.56a.75.75 0 00.42-.67V3.89a.75.75 0 00-.42-.67zM11 10.93L7.3 8 11 5.07v5.86z"/></svg></span>
    </a>
  </div>
</header>

<div id="chat">
  <div class="msg system">
    <div class="bubble">Connected — type a message to begin</div>
  </div>
</div>

<footer>
  <div class="toolbar-row">
    <div class="left">
      <span class="dev-only">Session: <span id="session-id">—</span></span>
    </div>
    <div class="right">
      <button class="toolbar-link" onclick="exportChat()" title="Export transcript">
        <span class="icon"><svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M7.47 10.78a.75.75 0 001.06 0l3.75-3.75a.75.75 0 00-1.06-1.06L8.75 8.44V1.75a.75.75 0 00-1.5 0v6.69L4.78 5.97a.75.75 0 00-1.06 1.06l3.75 3.75zM3.75 13a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5z"/></svg></span>
        Export
      </button>
      <button class="toolbar-link" onclick="clearChat()">Clear</button>
      <button class="toolbar-link dev-only" onclick="toggleDevMode()" id="dev-toggle">Dev</button>
    </div>
  </div>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Message brainstem..." autocomplete="off"></textarea>
    <button id="send" onclick="sendMessage()">Send</button>
  </div>
</footer>

<script>
  const API = '';
  let sessionId = null;
  let history = [];
  let fullTranscript = [];
  let devMode = localStorage.getItem('brainstem_dev') === 'true';
  if (devMode) document.body.classList.add('dev-mode');

  // SVG fragments for reuse
  const SVG_BRAIN = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93 0-.62.08-1.22.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>';
  const SVG_USER = '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';

  function toggleDevMode() {
    devMode = !devMode;
    document.body.classList.toggle('dev-mode', devMode);
    localStorage.setItem('brainstem_dev', devMode);
  }
  // Triple-click header to toggle dev mode (hidden gesture)
  let headerClicks = 0;
  document.querySelector('header h1').addEventListener('click', () => {
    headerClicks++;
    setTimeout(() => { headerClicks = 0; }, 600);
    if (headerClicks >= 3) { toggleDevMode(); headerClicks = 0; }
  });

  // Fix VS Code link with actual home directory
  fetch(`${API}/health`).then(r => r.json()).then(d => {
    if (d.brainstem_dir) {
      document.getElementById('vscode-link').href = 'vscode://file/' + d.brainstem_dir;
    }
  }).catch(() => {});

  // ── Health / Auth ──
  let loginInProgress = false;

  function showLoginOverlay() {
    document.getElementById('login-step1').style.display = 'block';
    document.getElementById('login-step2').style.display = 'none';
    document.getElementById('login-step3').style.display = 'none';
    document.querySelector('.login-btn').disabled = false;
    document.getElementById('login-overlay').style.display = 'flex';
  }

  function hideLoginOverlay() {
    document.getElementById('login-overlay').style.display = 'none';
  }

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      const dot = document.getElementById('dot');
      const statusText = document.getElementById('status-text');

      if (d.status === 'ok') {
        dot.className = d.copilot === '\u2713' ? 'dot' : 'dot pending';
        statusText.textContent = d.copilot === '\u2713' ? 'connected' : 'connecting...';
        statusText.style.cursor = 'default';
        statusText.onclick = null;
        hideLoginOverlay();
        localStorage.setItem('brainstem_auth', 'true');
        loginInProgress = false;
        loadModels();
      } else {
        dot.className = 'dot offline';
        statusText.textContent = 'sign in';
        statusText.style.cursor = 'pointer';
        statusText.onclick = showLoginOverlay;
        if (!localStorage.getItem('brainstem_auth') && !loginInProgress) {
          showLoginOverlay();
        }
      }
    } catch {
      document.getElementById('dot').className = 'dot offline';
      document.getElementById('status-text').textContent = 'offline';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  async function copyDeviceCode() {
    const code = document.getElementById('device-code').textContent;
    if (!code) return;
    try {
      await navigator.clipboard.writeText(code);
      const btn = document.getElementById('copy-code-btn');
      const toast = document.getElementById('copy-toast');
      btn.classList.add('copied');
      toast.textContent = 'Copied to clipboard';
      setTimeout(() => {
        btn.classList.remove('copied');
        toast.innerHTML = '&nbsp;';
      }, 2000);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      document.getElementById('copy-toast').textContent = 'Copied to clipboard';
      setTimeout(() => { document.getElementById('copy-toast').innerHTML = '&nbsp;'; }, 2000);
    }
  }

  async function startLogin() {
    try {
      document.querySelector('.login-btn').disabled = true;
      loginInProgress = true;
      const r = await fetch(`${API}/login`, { method: 'POST' });
      const d = await r.json();
      if (d.error) { alert(d.error); loginInProgress = false; return; }
      document.getElementById('login-step1').style.display = 'none';
      document.getElementById('login-step2').style.display = 'block';
      document.getElementById('device-code').textContent = d.user_code;
      document.getElementById('verify-link').href = d.verification_uri;
      copyDeviceCode();
      window.open(d.verification_uri, '_blank');
      pollLogin();
    } catch (e) {
      alert('Failed to start login: ' + e.message);
      loginInProgress = false;
      document.querySelector('.login-btn').disabled = false;
    }
  }

  async function pollLogin() {
    try {
      const r = await fetch(`${API}/login/poll`, { method: 'POST' });
      const d = await r.json();
      if (d.error) {
        document.getElementById('login-status').textContent = d.error;
        return;
      }
      if (d.status === 'ok') {
        document.getElementById('login-step2').style.display = 'none';
        document.getElementById('login-step3').style.display = 'block';
        loginInProgress = false;
        localStorage.setItem('brainstem_auth', 'true');
        setTimeout(hideLoginOverlay, 1500);
        checkHealth();
        return;
      }
      setTimeout(pollLogin, 5000);
    } catch { setTimeout(pollLogin, 5000); }
  }

  // ── Models ──
  let modelsLoaded = false;
  async function loadModels() {
    if (modelsLoaded) return;
    try {
      const r = await fetch(`${API}/models`);
      const d = await r.json();
      const sel = document.getElementById('model-select');
      sel.innerHTML = '';
      (d.models || []).forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id; opt.textContent = m.name;
        if (m.id === d.current) opt.selected = true;
        sel.appendChild(opt);
      });
      modelsLoaded = true;
    } catch {}
  }

  async function changeModel(modelId) {
    try {
      const r = await fetch(`${API}/models/set`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: modelId })
      });
      const d = await r.json();
      if (d.error) alert(d.error);
      else appendMsg('system', `Model: ${modelId}`);
    } catch (e) { alert('Failed to switch model: ' + e.message); }
  }

  // ── Input ──
  const input = document.getElementById('input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Chat rendering ──
  function appendMsg(role, text, logs) {
    const chat = document.getElementById('chat');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    const iconSpan = document.createElement('span');
    iconSpan.className = 'icon';
    iconSpan.innerHTML = role === 'user' ? SVG_USER : SVG_BRAIN;
    avatar.appendChild(iconSpan);

    const right = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'assistant' && typeof marked !== 'undefined') {
      bubble.innerHTML = marked.parse(text);
      bubble.querySelectorAll('a').forEach(a => a.target = '_blank');
    } else {
      bubble.textContent = text;
    }
    right.appendChild(bubble);

    if (logs) {
      const wrapper = document.createElement('div');
      wrapper.className = 'agent-logs-wrapper';
      // Extract agent names from log lines like "[AgentName] result"
      const agentNames = [...new Set((logs.match(/\[([^\]]+)\]/g) || []).map(m => m.slice(1, -1)))];
      const label = document.createElement('div');
      label.className = 'logs-label';
      const nameSpan = agentNames.length > 0
        ? ' <span class="agent-name">' + agentNames.join(', ') + '</span>'
        : '';
      label.innerHTML = '<span class="arrow">\u25B6</span> agent called' + nameSpan;
      const logBox = document.createElement('div');
      logBox.className = 'agent-logs collapsed';
      logBox.textContent = logs;
      label.onclick = () => {
        logBox.classList.toggle('collapsed');
        label.querySelector('.arrow').classList.toggle('open');
      };
      wrapper.appendChild(label);
      wrapper.appendChild(logBox);
      right.appendChild(wrapper);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(right);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function appendTyping() {
    const chat = document.getElementById('chat');
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'typing-indicator';
    const av = document.createElement('div');
    av.className = 'avatar';
    const ic = document.createElement('span');
    ic.className = 'icon'; ic.innerHTML = SVG_BRAIN;
    av.appendChild(ic);
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    wrap.appendChild(av);
    wrap.appendChild(bub);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  // ── Send ──
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send').disabled = true;

    appendMsg('user', text);
    history.push({ role: 'user', content: text });
    fullTranscript.push({ role: 'user', content: text, timestamp: new Date().toISOString() });

    appendTyping();

    try {
      const body = { user_input: text, conversation_history: history };
      if (sessionId) body.session_id = sessionId;

      const r = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const d = await r.json();
      removeTyping();
      if (d.agent_logs) console.log('[brainstem] agent_logs:', d.agent_logs.slice(0, 200));

      if (d.error) {
        if (d.error.startsWith('NO_COPILOT_ACCESS:')) {
          const username = d.error.split(':')[1] || 'this account';
          const wrap = appendMsg('system', '');
          wrap.querySelector('.bubble').innerHTML =
            `<strong>${username}</strong> doesn't have GitHub Copilot access. ` +
            `<a href="#" onclick="showLoginOverlay(); return false;" style="color:#58a6ff">Sign in with a different account</a> ` +
            `or <a href="https://github.com/github-copilot/signup" target="_blank" style="color:#58a6ff">sign up for Copilot</a>.`;
          localStorage.removeItem('brainstem_auth');
        } else if (d.error.includes('Not authenticated') || d.error.includes('Copilot') || d.error.includes('Sign in')) {
          const wrap = appendMsg('system', '');
          wrap.querySelector('.bubble').innerHTML =
            'Not signed in. <a href="#" onclick="showLoginOverlay(); return false;" style="color:#58a6ff">Sign in with GitHub</a> to use Copilot AI.';
        } else {
          appendMsg('system', `Error: ${d.error}`);
        }
      } else {
        sessionId = d.session_id;
        const sidEl = document.getElementById('session-id');
        if (sidEl) sidEl.textContent = sessionId?.slice(0, 8) + '...';
        history.push({ role: 'assistant', content: d.response });
        fullTranscript.push({
          role: 'assistant',
          content: d.response,
          agent_logs: d.agent_logs || null,
          voice_response: d.voice_response || null,
          model: document.getElementById('model-select')?.value || null,
          session_id: d.session_id,
          timestamp: new Date().toISOString()
        });
        appendMsg('assistant', d.response, d.agent_logs && d.agent_logs.trim() ? d.agent_logs : null);
        if (d.voice_response) {
          speakText(d.voice_response);
        } else if (voiceMode) {
          speakText(d.response.replace(/[#*`_\[\]()>|]/g, '').slice(0, 300));
        }
      }
    } catch (err) {
      removeTyping();
      appendMsg('system', `Could not reach brainstem: ${err.message}`);
    }

    document.getElementById('send').disabled = false;
    input.focus();
  }

  // ── Voice ──
  let voiceMode = false;

  async function toggleVoice() {
    try {
      const r = await fetch(`${API}/voice/toggle`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
      const d = await r.json();
      voiceMode = d.voice_mode;
      updateVoiceBtn();
    } catch(e) { console.error('Voice toggle failed:', e); }
  }

  function updateVoiceBtn() {
    const btn = document.getElementById('voice-btn');
    btn.className = voiceMode ? 'icon-btn active' : 'icon-btn';
    btn.title = voiceMode ? 'Voice mode on' : 'Voice mode off';
  }

  function speakText(text) {
    if (!text || !voiceMode) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.05; utter.pitch = 1.0;
    window.speechSynthesis.speak(utter);
  }

  fetch(`${API}/voice`).then(r => r.json()).then(d => {
    voiceMode = d.voice_mode;
    updateVoiceBtn();
  }).catch(() => {});

  // ── Actions ──
  function clearChat() {
    history = [];
    fullTranscript = [];
    sessionId = null;
    const sidEl = document.getElementById('session-id');
    if (sidEl) sidEl.textContent = '\u2014';
    const chat = document.getElementById('chat');
    chat.innerHTML = '<div class="msg system"><div class="bubble">Chat cleared</div></div>';
  }

  function exportChat() {
    if (!fullTranscript.length) { alert('Nothing to export yet.'); return; }
    const payload = {
      exported_at: new Date().toISOString(),
      session_id: sessionId,
      brainstem_version: document.title,
      model: document.getElementById('model-select')?.value || 'unknown',
      turns: fullTranscript
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `brainstem-chat-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
