<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RappterAcademy — Learn AI by Raising One</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #21262d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --purple: #bc8ff3; --yellow: #d29922;
    --orange: #f0883e; --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Top bar ── */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-logo { font-size: 20px; }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; font-size: 13px; }
  .streak { display: flex; align-items: center; gap: 4px; color: var(--orange); font-weight: 600; }
  .xp { display: flex; align-items: center; gap: 4px; color: var(--yellow); font-weight: 600; }

  /* ── Hero ── */
  .hero {
    text-align: center; padding: 48px 24px 40px;
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }
  .hero-egg { font-size: 72px; margin-bottom: 8px; }
  .hero h2 { font-size: 28px; margin-bottom: 8px; }
  .hero p { color: var(--muted); font-size: 16px; max-width: 480px; margin: 0 auto; }

  /* ── Skill tree ── */
  .tree { max-width: 420px; margin: 0 auto; padding: 0 24px 80px; }
  .path-label {
    text-align: center; margin: 40px 0 20px;
    font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .path-label.hatchling { color: var(--green); }
  .path-label.apprentice { color: var(--purple); }
  .path-label.builder { color: var(--orange); }

  /* Connector line between nodes */
  .connector { width: 3px; height: 24px; background: var(--border); margin: 0 auto; }
  .connector.done { background: var(--green); }

  /* Lesson node — Duolingo-style circle */
  .node {
    width: 72px; height: 72px; border-radius: 50%; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; cursor: pointer; position: relative;
    border: 3px solid var(--border); background: var(--surface);
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .node:hover { transform: scale(1.08); border-color: var(--accent); }
  .node.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(88,166,255,0.25); }
  .node.done { border-color: var(--green); background: rgba(63,185,80,0.1); }
  .node.locked { opacity: 0.35; cursor: default; }
  .node.locked:hover { transform: none; border-color: var(--border); }

  /* Checkmark badge on completed */
  .node.done::after {
    content: '✓'; position: absolute; bottom: -4px; right: -4px;
    background: var(--green); color: #000; font-size: 12px; font-weight: 800;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg);
  }

  /* Lesson title under node */
  .node-label {
    text-align: center; margin: 8px auto 0;
    font-size: 12px; font-weight: 600; color: var(--muted);
    max-width: 140px;
  }
  .node.active + .node-label { color: var(--text); }
  .node.done + .node-label { color: var(--green); }

  /* ── Lesson detail card (expands on click) ── */
  .lesson-card {
    display: none; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; margin: 12px auto 0;
    max-width: 340px; text-align: left;
  }
  .lesson-card.open { display: block; }
  .lesson-card h3 { font-size: 15px; margin-bottom: 6px; }
  .lesson-card p { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .lesson-card .xp-reward { font-size: 12px; color: var(--yellow); margin-bottom: 12px; }
  .start-btn {
    display: inline-block; background: var(--accent); color: #000;
    font-weight: 700; font-size: 14px; padding: 10px 28px;
    border-radius: 10px; border: none; cursor: pointer;
    transition: background 0.15s;
  }
  .start-btn:hover { background: #79c0ff; text-decoration: none; }
  .start-btn.completed { background: var(--green); }

  /* ── Footer ── */
  .footer {
    text-align: center; padding: 24px; font-size: 12px; color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">🎓</span>
  <h1>RappterAcademy</h1>
  <div class="topbar-right">
    <span class="streak" id="streak" title="Day streak">🔥 <span id="streak-count">0</span></span>
    <span class="xp" id="xp-display" title="Experience points">⚡ <span id="xp-count">0</span> XP</span>
  </div>
</div>

<div class="hero">
  <div class="hero-egg">🥚</div>
  <h2>Learn AI by Raising One</h2>
  <p>Start with an egg. End with a creature that thinks, remembers, and grows — built by you.</p>
</div>

<div class="tree" id="skill-tree"></div>

<div class="footer">
  RappterAcademy — Governed by the <a href="../../rapp_brainstem/CONSTITUTION.md">Constitution</a> ·
  <a href="ROADMAP.md">Roadmap</a> ·
  <a href="THE_HELPFUL_RAPPTER_AND_PYTHON.md">📖 Kids Book</a> ·
  <a href="../MASTER_PLAN.md">🚀 Master Plan</a>
</div>

<script>
  // ── Lesson data ──
  const LESSONS = [
    { path: 'hatchling', label: '🥚 Hatchling Path' },
    { id: '01', icon: '🫀', title: "What's Alive In There?", desc: 'Discover why your rappter has a heartbeat — and what that means.', xp: 50, href: 'lessons/01-whats-alive-in-there.html' },
    { id: '02', icon: '🥚', title: 'Hatching Your Rappter', desc: 'Run one command. Watch it wake up.', xp: 100, href: 'lessons/02-hatching-your-rappter.html' },
    { id: '03', icon: '💬', title: 'Talking to Your Rappter', desc: 'Your first conversation — and how it thinks.', xp: 75, href: 'lessons/03-talking-to-your-rappter.html' },
    { id: '04', icon: '📜', title: 'Giving It a Soul', desc: 'Edit soul.md and make your rappter yours.', xp: 100, href: 'lessons/04-giving-it-a-soul.html' },
    { id: '05', icon: '🦾', title: 'Teaching It a Trick', desc: 'Write your first agent — a brand new skill.', xp: 150, href: 'lessons/05-teaching-it-a-trick.html' },

    { path: 'apprentice', label: '🦎 Apprentice Path' },
    { id: '06', icon: '🧠', title: 'How Memory Works', desc: 'How it remembers you between conversations.', xp: 100, href: 'lessons/06-how-memory-works.html' },
    { id: '07', icon: '🫀', title: 'The Heartbeat Deep Dive', desc: 'Inside daemon.py — what "alive" really means.', xp: 125, href: 'lessons/07-the-heartbeat-deep-dive.html' },
    { id: '08', icon: '📓', title: 'Reading the Journal', desc: "Your rappter's inner monologue.", xp: 75, href: 'lessons/08-reading-the-journal.html' },
    { id: '09', icon: '🌐', title: 'Agents That Call APIs', desc: 'Connecting to the outside world.', xp: 150, href: 'lessons/09-agents-that-call-apis.html' },
    { id: '10', icon: '🩺', title: 'Debugging Like a Doctor', desc: 'When your rappter feels sick.', xp: 125, href: 'lessons/10-debugging-like-a-doctor.html' },

    { path: 'builder', label: '🐉 Builder Path' },
    { id: '11', icon: '🦴', title: 'The Spinal Cord', desc: 'Deploy to Azure — your rappter leaves home.', xp: 200, href: 'lessons/11-the-spinal-cord.html' },
    { id: '12', icon: '🧬', title: 'The Nervous System', desc: 'Reach into Teams and M365.', xp: 200, href: 'lessons/12-the-nervous-system.html' },
    { id: '13', icon: '🎁', title: 'Building for Others', desc: 'Package agents for the community.', xp: 175, href: 'lessons/13-building-for-others.html' },
    { id: '14', icon: '📜', title: 'The Constitution', desc: 'The principles behind every decision.', xp: 100, href: 'lessons/14-the-constitution.html' },
    { id: '15', icon: '✍️', title: 'Writing Your Own Lesson', desc: 'Teach someone else what you learned.', xp: 250, href: 'lessons/15-writing-your-own-lesson.html' },
  ];

  // ── Progress (localStorage) ──
  function getProgress() {
    try { return JSON.parse(localStorage.getItem('rappteracademy_progress') || '{}'); } catch { return {}; }
  }
  function saveProgress(p) { localStorage.setItem('rappteracademy_progress', JSON.stringify(p)); }
  function markComplete(id) {
    const p = getProgress();
    if (!p[id]) {
      p[id] = { completed: true, date: new Date().toISOString().slice(0,10) };
      saveProgress(p);
    }
    updateUI();
  }
  // Exposed globally so lessons can call it
  window.rappterAcademy = { markComplete, getProgress };

  function getXP() {
    const p = getProgress();
    return LESSONS.filter(l => l.id && p[l.id]).reduce((sum, l) => sum + (l.xp || 0), 0);
  }
  function getStreak() {
    const p = getProgress();
    const dates = [...new Set(Object.values(p).map(v => v.date).filter(Boolean))].sort().reverse();
    if (!dates.length) return 0;
    const today = new Date().toISOString().slice(0,10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if (dates[0] !== today && dates[0] !== yesterday) return 0;
    let streak = 1;
    for (let i = 1; i < dates.length; i++) {
      const prev = new Date(dates[i-1]); const curr = new Date(dates[i]);
      if ((prev - curr) / 86400000 <= 1.5) streak++; else break;
    }
    return streak;
  }

  // ── Render skill tree ──
  let openCard = null;
  function renderTree() {
    const tree = document.getElementById('skill-tree');
    const progress = getProgress();
    let html = '';
    let prevDone = true; // first lesson is always unlocked

    LESSONS.forEach((item, i) => {
      if (item.path) {
        html += `<div class="path-label ${item.path}">${item.label}</div>`;
        return;
      }

      const done = !!progress[item.id];
      const locked = !prevDone && !done;
      const isNext = prevDone && !done && !LESSONS.slice(0, i).filter(l => l.id && !l.path).some(l => !progress[l.id] && l !== item);
      const active = !done && !locked;
      const cls = done ? 'done' : locked ? 'locked' : active ? 'active' : '';

      if (i > 0 && LESSONS[i-1].id) {
        html += `<div class="connector ${done ? 'done' : ''}"></div>`;
      }

      html += `
        <div class="node ${cls}" data-id="${item.id}" onclick="toggleCard('${item.id}')">${item.icon}</div>
        <div class="node-label">${item.title}</div>
        <div class="lesson-card" id="card-${item.id}">
          <h3>${item.icon} ${item.title}</h3>
          <p>${item.desc}</p>
          <div class="xp-reward">⚡ ${item.xp} XP</div>
          ${item.href && !locked
            ? `<a class="start-btn ${done ? 'completed' : ''}" href="${item.href}">${done ? '✓ Review' : 'Start Lesson'}</a>`
            : locked
              ? `<span style="color:var(--muted);font-size:13px;">Complete the previous lesson to unlock.</span>`
              : `<span style="color:var(--muted);font-size:13px;">Coming soon</span>`
          }
        </div>
      `;

      prevDone = done;
    });

    tree.innerHTML = html;
  }

  function toggleCard(id) {
    const card = document.getElementById('card-' + id);
    if (!card) return;
    const wasOpen = card.classList.contains('open');
    document.querySelectorAll('.lesson-card.open').forEach(c => c.classList.remove('open'));
    if (!wasOpen) card.classList.add('open');
  }

  function updateUI() {
    renderTree();
    document.getElementById('xp-count').textContent = getXP();
    document.getElementById('streak-count').textContent = getStreak();
  }

  updateUI();
</script>

</body>
</html>
